<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Melvin Peralta - Professional Portfolio and Resume" />

    <!-- Add inline styles to ensure the page isn't blank during loading -->
    <style>
      body {
        background-color: #0f172a;
        color: #ffffff;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
    </style>

    <!-- Preload critical assets -->
    <link rel="preload" href="/assets/images/Profile pic 2.jpg" as="image" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload education images with smaller sizes -->
    <link rel="preload" href="/assets/images/anne-arundel-cc.jpg" as="image" imagesizes="320px" />
    <link rel="preload" href="/assets/images/cat-north.jpg" as="image" imagesizes="320px" />
    <link rel="preload" href="/assets/images/Meade-hs.jpg" as="image" imagesizes="320px" />

    <!-- Add image dimensions to enable browser to allocate space before loading -->
    <meta name="image-anne-arundel-cc" content="320x120" />
    <meta name="image-cat-north" content="320x120" />
    <meta name="image-meade-hs" content="320x120" />

    <title>Melvin Peralta - Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
