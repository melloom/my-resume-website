<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Melvin Peralta - Professional Portfolio and Resume" />

    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
      (function() {
        try {
          // Get theme from localStorage or use dark as default
          const savedTheme = localStorage.getItem('theme') || 'dark';
          // Apply theme immediately to prevent flash
          document.documentElement.setAttribute('data-theme', savedTheme);
          // Save the preference for consistency
          localStorage.setItem('theme', savedTheme);
          
          // Add a flag to prevent service worker from overriding theme
          window.__THEME_INITIALIZED__ = true;
          
          // Force dark mode styles immediately to prevent gray flash
          if (savedTheme === 'dark') {
            document.documentElement.style.colorScheme = 'dark';
            // Add inline style to ensure dark background immediately
            const style = document.createElement('style');
            style.textContent = `
              body { 
                background-color: #0f172a !important; 
                color: #ffffff !important;
              }
            `;
            document.head.appendChild(style);
          }
        } catch (e) {
          // Fallback to dark theme if localStorage fails
          document.documentElement.setAttribute('data-theme', 'dark');
          console.error('Theme initialization error:', e);
        }
      })();
    </script>

    <!-- Add inline styles to ensure the page isn't blank during loading -->
    <style>
      body {
        background-color: #0f172a;
        color: #ffffff;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      
      /* Add conditional styling for light mode */
      html[data-theme="light"] body {
        background-color: #f8fafc;
        color: #1e293b;
      }
    </style>

    <!-- Preload critical assets - Fix path to match actual location -->
    <link rel="preload" href="/photo 1.jpg" as="image" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fix preloaded education image paths to match actual usage -->
    <link rel="preload" href="/images/school/anne-arundel-cc.jpg" as="image" />
    <link rel="preload" href="/images/school/cat-north.jpg" as="image" />
    <link rel="preload" href="/images/school/Meade-hs.jpg" as="image" />

    <!-- Add image dimensions to enable browser to allocate space before loading -->
    <meta name="image-anne-arundel-cc" content="320x120" />
    <meta name="image-cat-north" content="320x120" />
    <meta name="image-meade-hs" content="320x120" />

    <title>Melvin Peralta - Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
